    </pattern>
  </defs><rect width="860" height="620" fill="#0f1e3c"/><text x="430.0" y="28" class="svg-label" text-anchor="middle" fill="#ffd700" style="font-size:15px;font-weight:bold">物理的な入れ子構造 — データセンターからダイまで</text><text x="430.0" y="46" class="svg-label-sm" text-anchor="middle">外側=大きい/全体システム、内側=小さい/個別部品。各枠が本ロードマップのどのレイヤーかを右に示す。</text><rect x="60" y="62" width="740" height="540" rx="6" fill="#13284d" stroke="#00d9ff" stroke-width="1" opacity="0.55"/><rect x="90" y="92" width="680" height="480" rx="6" fill="#16305c" stroke="#00d9ff" stroke-width="1" opacity="0.55"/><rect x="120" y="122" width="560" height="410" rx="6" fill="#1a3a6e" stroke="#00d9ff" stroke-width="1" opacity="0.55"/><rect x="150" y="162" width="470" height="320" rx="6" fill="#1f4680" stroke="#00d9ff" stroke-width="1" opacity="0.55"/><rect x="180" y="200" width="400" height="230" rx="6" fill="#274f8c" stroke="#00d9ff" stroke-width="1" opacity="0.55"/><rect x="220" y="238" width="320" height="150" rx="6" fill="#2e5a9e" stroke="#00d9ff" stroke-width="1" opacity="0.55"/><rect x="270" y="270" width="220" height="78" rx="6" fill="#3a6bb5" stroke="#00d9ff" stroke-width="1" opacity="0.55"/><text x="70" y="79" class="svg-label" fill="#e8eefc" style="font-size:12.5px;font-weight:bold">データセンター / AIファクトリー</text><text x="70" y="93" class="svg-label-sm" fill="#9fb6d6">建屋全体・〜数百MW〜GW級</text><rect x="714" y="68" width="78" height="16" rx="8" fill="#0f1e3c" stroke="#ffd700" stroke-width="0.8"/><text x="753" y="79" class="svg-label-sm" fill="#ffd700" text-anchor="middle">L1 電力・冷却</text><text x="100" y="109" class="svg-label" fill="#e8eefc" style="font-size:12.5px;font-weight:bold">データホール</text><text x="100" y="123" class="svg-label-sm" fill="#9fb6d6">1部屋・数MW・多数の列(row)</text><rect x="684" y="98" width="78" height="16" rx="8" fill="#0f1e3c" stroke="#ffd700" stroke-width="0.8"/><text x="723" y="109" class="svg-label-sm" fill="#ffd700" text-anchor="middle">L1</text><text x="130" y="139" class="svg-label" fill="#e8eefc" style="font-size:12.5px;font-weight:bold">ラック (rack)</text><text x="130" y="153" class="svg-label-sm" fill="#9fb6d6">棚1本・〜120kW〜1MW・GPU多数</text><rect x="594" y="128" width="78" height="16" rx="8" fill="#0f1e3c" stroke="#ffd700" stroke-width="0.8"/><text x="633" y="139" class="svg-label-sm" fill="#ffd700" text-anchor="middle">L1/L6</text><text x="160" y="179" class="svg-label" fill="#e8eefc" style="font-size:12.5px;font-weight:bold">ノード / トレイ (compute tray)</text><text x="160" y="193" class="svg-label-sm" fill="#9fb6d6">ラックに挿す引き出し1枚・CPU+GPU+メモリ</text><rect x="534" y="168" width="78" height="16" rx="8" fill="#0f1e3c" stroke="#ffd700" stroke-width="0.8"/><text x="573" y="179" class="svg-label-sm" fill="#ffd700" text-anchor="middle">L5/L6</text><text x="190" y="217" class="svg-label" fill="#e8eefc" style="font-size:12.5px;font-weight:bold">PCB / マザーボード</text><text x="190" y="231" class="svg-label-sm" fill="#9fb6d6">ノード内の配線基板。部品を載せる土台</text><rect x="494" y="206" width="78" height="16" rx="8" fill="#0f1e3c" stroke="#ffd700" stroke-width="0.8"/><text x="533" y="217" class="svg-label-sm" fill="#ffd700" text-anchor="middle">L1/L3</text><text x="230" y="255" class="svg-label" fill="#e8eefc" style="font-size:12.5px;font-weight:bold">パッケージ (package)</text><text x="230" y="269" class="svg-label-sm" fill="#9fb6d6">PCB上の1チップ部品。GPU+HBMを1枚に統合</text><rect x="454" y="244" width="78" height="16" rx="8" fill="#0f1e3c" stroke="#ffd700" stroke-width="0.8"/><text x="493" y="255" class="svg-label-sm" fill="#ffd700" text-anchor="middle">L3/L4</text><text x="280" y="287" class="svg-label" fill="#e8eefc" style="font-size:12.5px;font-weight:bold">ダイ (die)</text><text x="280" y="301" class="svg-label-sm" fill="#9fb6d6">パッケージ内のシリコン本体。トランジスタの塊</text><rect x="404" y="276" width="78" height="16" rx="8" fill="#0f1e3c" stroke="#ffd700" stroke-width="0.8"/><text x="443" y="287" class="svg-label-sm" fill="#ffd700" text-anchor="middle">L2/L5</text><rect x="288" y="292" width="80" height="40" fill="#1d3563" stroke="#00d9ff" stroke-width="1"/><text x="328" y="316" class="svg-label-sm" text-anchor="middle" fill="#cfe0ff">GPUダイ</text><rect x="378" y="296" width="26" height="34" fill="#243f6e" stroke="#ffd700" stroke-width="0.6"/><rect x="412" y="296" width="26" height="34" fill="#243f6e" stroke="#ffd700" stroke-width="0.6"/><text x="404" y="344" class="svg-label-sm" text-anchor="middle" fill="#ffd700">HBM</text></svg>